name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de functions
        working-directory: functions
        run: npm install

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Configurar secret RESEND_API_KEY en Firebase
        run: |
          printf '%s' "${{ secrets.RESEND_API_KEY }}" | firebase functions:secrets:set RESEND_API_KEY \
            --project newmaritime-implementator \
            --data-file - \
            --force \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project newmaritime-implementator --token "${{ secrets.FIREBASE_TOKEN }}"
